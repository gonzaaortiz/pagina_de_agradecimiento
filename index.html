<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias por tu ayuda - Gonza Ortiz</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Fuentes elegantes (Merriweather para título, Inter para botón) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <!-- Reemplazá profile.jpg con el nombre real de la foto que subiste -->
        <div class="profile-wrapper">
            <img src="profile.jpg" alt="Gonza Ortiz" class="profile-img">
        </div>
        
        <h1 class="title">¡Muchas gracias!</h1>
        <p class="subtitle">Tu ayuda me permite<br>seguir ayudando.</p>
        
        <a href="https://link.mercadopago.com.ar/gonzaortiz" class="donate-btn" target="_blank" rel="noopener noreferrer">
            Donar
        </a>
        
        <div class="payment-methods">
            <span>MercadoPago • Tarjetas de crédito/débito</span>
        </div>

        <div class="footer-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        </div>
    </main>
</body>
</html>
